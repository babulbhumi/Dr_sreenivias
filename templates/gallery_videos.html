{% extends "base.html" %}

{% block title %}Video Gallery | Dr. Sreenivas Aesthetics{% endblock %}

{% block content %}
<section class="section-pad" style="background: var(--white); min-height: 80vh; padding-top: 100px;">
    <div class="container">
        <div class="text-center mb-5">
            <span class="section-eyebrow">Watch & Learn</span>
            <h2 class="section-title">Video Gallery</h2>
            <hr class="divider-gold mx-auto">
            <p class="text-muted">Explore patient journeys, procedure explainers, and clinic tours.</p>
        </div>

        <div class="row g-4">
            <div class="col-12 text-center p-5" style="border: 2px dashed var(--clr-border); border-radius: 12px;">
                <i class="bi bi-play-btn text-muted" style="font-size: 3rem;"></i>
                <p class="mt-3 text-muted">YouTube video embeds will be added here.</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
